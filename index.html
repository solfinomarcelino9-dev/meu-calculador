<!DOCTYPE html>
<html lang="pt">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-58P7VZ8N6W"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-58P7VZ8N6W');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcObra Pro - Blocos MZ</title>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 0.9em; margin-bottom: 25px; }
        label { display: block; margin-top: 15px; color: #34495e; font-weight: 600; font-size: 0.85em; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #dfe6e9; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; background: white; }
        button { width: 100%; padding: 16px; background: #27ae60; color: white; border: none; border-radius: 10px; margin-top: 25px; cursor: pointer; font-size: 17px; font-weight: bold; }
        .result { margin-top: 25px; padding: 20px; background: #f0fff4; border: 1px solid #c6f6d5; border-radius: 12px; display: none; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #c6f6d5; padding-bottom: 5px; }
        .val { font-weight: bold; color: #2d3748; }
        .footer-links { margin-top: 30px; text-align: center; font-size: 11px; color: #95a5a6; }
    </style>
</head>
<body>

<div class="card">
    <h2>CalcObra Pro 🏗️</h2>
    <p class="subtitle">Especialista em Blocos de Cimento</p>

    <label>Tipo de Bloco (Dimensões em cm)</label>
    <select id="tipoBloco">
        <option value="12.5">Bloco de 10 (10x20x40)</option>
        <option value="12.5">Bloco de 15 (15x20x40)</option>
        <option value="12.5">Bloco de 20 (20x20x40)</option>
    </select>

    <label>Comprimento da Parede (m)</label>
    <input type="number" id="cp" placeholder="Ex: 10" step="0.01">

    <label>Altura da Parede (m)</label>
    <input type="number" id="ap" placeholder="Ex: 3" step="0.01">

    <button onclick="calcularObra()">Calcular Materiais</button>

    <div id="res" class="result">
        <div class="result-item"><span>🧱 Quantidade de Blocos:</span> <span id="resBloco" class="val">0</span></div>
        <div class="result-item"><span>📦 Cimento (50kg):</span> <span id="resCimento" class="val">0</span></div>
        <div class="result-item"><span>⏳ Areia (m³):</span> <span id="resAreia" class="val">0</span></div>
        <p style="font-size: 0.7em; color: #7f8c8d; margin-top: 10px;">*Cálculo para blocos de 40cm de comprimento, incluindo 10% de quebras.</p>
    </div>
</div>

<div class="footer-links">
    <p>© 2026 CalcObra Pro - Solfino Marcelino</p>
    <a href="javascript:void(0)" onclick="alert('Política de Privacidade: Usamos Google Analytics para melhorar sua experiência.')" style="color: #27ae60; text-decoration: none;">Privacidade</a>
</div>

<script>
    function calcularObra() {
        const cp = parseFloat(document.getElementById('cp').value);
        const ap = parseFloat(document.getElementById('ap').value);
        const tipo = document.getElementById('tipoBloco').value;

        if (cp > 0 && ap > 0) {
            const area = cp * ap;
            
            // Em Moçambique, um bloco padrão de 40x20cm ocupa 0.08m2.
            // São necessários 12.5 blocos por m2 (sem contar juntas).
            // Com as juntas de 1.5cm, usamos cerca de 12 blocos por m2.
            let blocos = Math.ceil(area * 12.5 * 1.10); 

            // Cálculo de argamassa de assentamento
            // Blocos de 15 e 20 gastam mais massa que o de 10.
            const volArgamassa = area * 0.025; 
            let sacosCimento = Math.ceil(volArgamassa * 6); // Estimativa de sacos por m3
            let m3Areia = (volArgamassa * 0.95).toFixed(2);

            document.getElementById('resBloco').innerText = blocos + ' unidades';
            document.getElementById('resCimento').innerText = sacosCimento + ' sacos';
            document.getElementById('resAreia').innerText = m3Areia + ' m³';
            document.getElementById('res').style.display = 'block';
            
            gtag('event', 'calculo_blocos_mz', { 'area': area });
        } else {
            alert("Por favor, preencha os dados da parede.");
        }
    }
</script>

</body>
</html>
